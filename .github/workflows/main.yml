name: "daily alerts"

on:
  workflow_dispatch:
  schedule:
    - cron: "15 21 * * 1,3,5"

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.TOKEN || github.token }}
      KEYWORD_LIST: ${{ vars.KEYWORD_LIST || 'AGN, blazar, BL Lac' }}
      ARXIV_CATEGORY: ${{ vars.ARXIV_CATEGORY }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      OPENAI_MODEL: gpt-5-nano
      GEMINI_MODEL: gemini-3-pro-preview
      MAX_RESULTS: "99"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py --mode all --max-results "${MAX_RESULTS}"

      - name: Commit export files
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git add export/*.md || true
          git commit -m "Automated export snapshot" || echo "No changes"
          git push
